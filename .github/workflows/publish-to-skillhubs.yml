name: Publish to SkillHub Platforms

on:
  push:
    branches: [main]
    paths:
      - "SKILL.md"
      - "publish.json"
      - "scripts/**"
      - "references/**"
      - "README.md"
  workflow_dispatch:
    inputs:
      platforms:
        description: "clawhub,agentskillhub,skillshubai,pr or all"
        required: false
        default: "all"
      dry_run:
        description: "Dry run"
        required: false
        default: "false"
        type: boolean

jobs:
  load-config:
    runs-on: ubuntu-latest
    outputs:
      skill_name: ${{ steps.cfg.outputs.skill_name }}
      display_name: ${{ steps.cfg.outputs.display_name }}
      version: ${{ steps.cfg.outputs.version }}
      tags: ${{ steps.cfg.outputs.tags }}
      clawscan_note: ${{ steps.cfg.outputs.clawscan_note }}
    steps:
      - uses: actions/checkout@v4
      - id: cfg
        run: |
          python3 <<'PY'
          import json, re, os, sys

          def read_fm(path):
              text = open(path).read()
              m = re.match(r'^---\s*\n(.*?)\n---', text, re.DOTALL)
              fm = {}
              if m:
                  for line in m.group(1).splitlines():
                      if ':' in line:
                          k, _, v = line.partition(':')
                          fm[k.strip()] = v.strip().strip('"')
              return fm

          cfg = {}
          if os.path.exists('publish.json'):
              cfg = json.load(open('publish.json'))
          fm = read_fm('SKILL.md')
          name = cfg.get('skill_name') or fm.get('name') or os.path.basename(os.getcwd())
          display = cfg.get('display_name') or name.replace('-', ' ').title()
          version = cfg.get('version') or fm.get('version') or '1.0.0'
          tags = cfg.get('tags') or []
          if isinstance(tags, list):
              tags = ','.join(tags)
          note = cfg.get('clawscan_note', '')

          out = os.environ['GITHUB_OUTPUT']
          with open(out, 'a') as f:
              f.write(f"skill_name={name}\n")
              f.write(f"display_name={display}\n")
              f.write(f"version={version}\n")
              f.write(f"tags={tags}\n")
              f.write(f"clawscan_note={note}\n")
          PY

  publish-clawhub:
    needs: load-config
    name: clawhub.ai
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.platforms == '' || github.event.inputs.platforms == 'all' || contains(github.event.inputs.platforms, 'clawhub') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @clawhub/cli --silent
      - env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          [ -z "$CLAWHUB_TOKEN" ] && echo "⚠️ CLAWHUB_TOKEN not set" && exit 0
          mkdir -p "$HOME/.config/clawhub"
          echo "{\"registry\":\"https://registry.clawhub.ai\",\"token\":\"$CLAWHUB_TOKEN\"}" > "$HOME/.config/clawhub/config.json"
          [ "${{ inputs.dry_run }}" = "true" ] && echo "[DRY RUN]" && exit 0
          clawhub --workdir "$(dirname $(pwd))" publish "$(basename $(pwd))" \
            --slug "${{ needs.load-config.outputs.skill_name }}" \
            --name "${{ needs.load-config.outputs.display_name }}" \
            --version "${{ needs.load-config.outputs.version }}" \
            --tags "${{ needs.load-config.outputs.tags }},latest" \
            --no-input

  publish-agentskillhub:
    needs: load-config
    name: agentskillhub.dev
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.platforms == '' || github.event.inputs.platforms == 'all' || contains(github.event.inputs.platforms, 'agentskillhub') }}
    steps:
      - env:
          AGENTSKILLHUB_TOKEN: ${{ secrets.AGENTSKILLHUB_TOKEN }}
          REPO_URL: https://github.com/${{ github.repository }}
          SKILL_NAME: ${{ needs.load-config.outputs.skill_name }}
        run: |
          [ -z "$AGENTSKILLHUB_TOKEN" ] && echo "⚠️ AGENTSKILLHUB_TOKEN not set" && exit 0
          [ "${{ inputs.dry_run }}" = "true" ] && echo "[DRY RUN]" && exit 0
          curl -sf -X POST "https://agentskillhub.dev/api/v1/repos/import" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $AGENTSKILLHUB_TOKEN" \
            -d "{\"repoFullName\": \"${{ github.repository }}\", \"selectedPaths\": [\".\"]}" \
            || echo "⚠️ agentskillhub import failed (platform GitHub integration may be down)"

  publish-skillshubai:
    needs: load-config
    name: skills-hub.ai
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.platforms == '' || github.event.inputs.platforms == 'all' || contains(github.event.inputs.platforms, 'skillshubai') }}
    steps:
      - uses: actions/checkout@v4
      - env:
          SKILLSHUBAI_TOKEN: ${{ secrets.SKILLSHUBAI_TOKEN }}
        run: |
          [ -z "$SKILLSHUBAI_TOKEN" ] && echo "⚠️ SKILLSHUBAI_TOKEN not set" && exit 0
          [ "${{ inputs.dry_run }}" = "true" ] && echo "[DRY RUN]" && exit 0
          python3 <<'PY'
          import json, re, os, urllib.request, urllib.error
          token = os.environ["SKILLSHUBAI_TOKEN"]
          repo_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}"
          content = open("SKILL.md").read()
          fm_match = re.match(r'^---\s*\n(.*?)\n---\s*\n', content, re.DOTALL)
          fm, body = fm_match.group(1), content[fm_match.end():]

          def get_field(name, text):
              m = re.search(rf'^{name}:\s*(.+)$', text, re.MULTILINE)
              return m.group(1).strip().strip('"') if m else ""

          tags_m = re.search(r'^tags:\s*(.+)$', fm, re.MULTILINE)
          tags = [t.strip() for t in (tags_m.group(1).split(",") if tags_m else [])]
          slug = get_field("name", fm)
          cfg = json.load(open("publish.json")) if os.path.exists("publish.json") else {}
          version = cfg.get("version") or get_field("version", fm) or "1.0.0"

          payload = {
              "name": slug,
              "description": get_field("description", fm)[:500] or slug,
              "version": version,
              "categorySlug": get_field("category", fm) or cfg.get("category", "productivity"),
              "platforms": ["CLAUDE_CODE", "CURSOR", "GEMINI_CLI"],
              "instructions": body.strip()[:8000],
              "visibility": "PUBLIC",
              "tags": tags[:10],
              "githubRepoUrl": repo_url,
          }

          def api(method, path, data=None):
              req = urllib.request.Request(
                  f"https://api.skills-hub.ai/api/v1/skills{path}",
                  data=json.dumps(data).encode() if data is not None else None,
                  headers={"Content-Type": "application/json", "Authorization": f"ApiKey {token}", "User-Agent": "Mozilla/5.0"},
                  method=method,
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      return resp.status, json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  return e.code, json.loads(e.read())

          code, data = api("GET", f"/{slug}")
          if code == 404:
              code, data = api("POST", "", payload)
              if code in (200, 201):
                  api("POST", f"/{slug}/publish", {})
          elif code == 200:
              code, data = api("POST", f"/{slug}/versions", payload)
              if code in (200, 201):
                  api("POST", f"/{slug}/publish", {})
          print(f"skills-hub HTTP {code}: {data.get('status') or data.get('error')}")
          PY
